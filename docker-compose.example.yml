version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: learn_linux_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learn_linux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learn_linux"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learn_linux_backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=learn_linux
      - DB_SSLMODE=disable
      - JWT_SECRET=YOUR_SECURE_JWT_SECRET_KEY
      - DEV_MODE=true
      - BREVO_API_KEY=YOUR_BREVO_API_KEY
      - SMTP_SENDER=YOUR_BREVO_SENDER_EMAIL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db

  gateway:
    image: nginx:alpine
    container_name: learn_linux_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/codewarts.crt:/etc/nginx/ssl/codewarts.crt:ro
      - ../nginx/codewarts.key:/etc/nginx/ssl/codewarts.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  pgdata:
